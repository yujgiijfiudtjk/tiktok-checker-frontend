<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Age Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #222222;
      --pink: #ff2d55;
      --cyan: #00f0ff;
      --text: #f0f0f0;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,45,85,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,45,85,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--pink);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    h1 {
      font-size: clamp(26px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 40%, var(--pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-family: 'DM Mono', monospace;
      margin-top: 6px;
    }

    /* Search Box */
    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      transition: border-color 0.3s;
    }

    .search-box:focus-within {
      border-color: var(--pink);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .at-sign {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
    }

    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 12px 12px 30px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--cyan); }
    input::placeholder { color: var(--muted); }

    button {
      background: var(--pink);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button:hover { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    .error {
      display: none;
      background: rgba(255,45,85,0.08);
      border: 1px solid rgba(255,45,85,0.3);
      border-radius: 12px;
      padding: 16px 20px;
      color: var(--pink);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      text-align: center;
    }

    /* Result Card */
    .result {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: #141414;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--pink);
    }

    .avatar-placeholder {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #222;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .profile-info { flex: 1; }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
    }

    .profile-handle {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-top: 2px;
    }

    .verified-badge {
      background: var(--cyan);
      color: #000;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
    }

    /* Highlight Date */
    .date-highlight {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(255,45,85,0.05), rgba(0,240,255,0.05));
    }

    .date-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .date-value {
      font-size: 26px;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: -0.5px;
    }

    .age-value {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* Stats grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .stat {
      background: var(--card);
      padding: 16px 12px;
      text-align: center;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    footer {
      text-align: center;
      margin-top: 32px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
    }

    footer a { color: var(--pink); text-decoration: none; }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">♪</div>
      <h1>TikTok Age Checker</h1>
    </div>
    <p class="subtitle">// find out when any account was created</p>
  </header>

  <div class="search-box">
    <div class="input-wrap">
      <span class="at-sign">@</span>
      <input type="text" id="usernameInput" placeholder="username" autocomplete="off" />
    </div>
    <button id="checkBtn" onclick="checkUser()">Check →</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Fetching TikTok data...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <div class="profile-header">
      <div id="avatarWrap"></div>
      <div class="profile-info">
        <div class="profile-name" id="nickname"></div>
        <div class="profile-handle" id="handle"></div>
      </div>
    </div>

    <div class="date-highlight">
      <div class="date-label">Account Created On</div>
      <div class="date-value" id="creationDate"></div>
      <div class="age-value" id="accountAge"></div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="followers">—</div>
        <div class="stat-label">Followers</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="likes">—</div>
        <div class="stat-label">Likes</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="videos">—</div>
        <div class="stat-label">Videos</div>
      </div>
    </div>
  </div>

  <footer>
    Built with ♥ &nbsp;|&nbsp; Data via RapidAPI
  </footer>
</div>

<script>
  // ✅ এখানে তোমার Render backend URL দাও
  const BACKEND_URL = "https://tiktok-checker-api.onrender.com";

  function formatNumber(n) {
    if (!n) return "0";
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + "M";
    if (n >= 1_000) return (n / 1_000).toFixed(1) + "K";
    return n.toString();
  }

  async function checkUser() {
    const input = document.getElementById("usernameInput");
    const username = input.value.trim().replace(/^@/, "");

    if (!username) {
      showError("Please enter a TikTok username.");
      return;
    }

    hide("result");
    hide("error");
    show("loading");
    document.getElementById("checkBtn").disabled = true;

    try {
      const res = await fetch(`${BACKEND_URL}/tiktok/${username}`);
      const data = await res.json();

      if (!res.ok || data.error) {
        throw new Error(data.error || "User not found");
      }

      // Avatar
      const avatarWrap = document.getElementById("avatarWrap");
      if (data.avatar) {
        avatarWrap.innerHTML = `<img class="avatar" src="${data.avatar}" alt="avatar" onerror="this.parentElement.innerHTML='<div class=avatar-placeholder>🎵</div>'"/>`;
      } else {
        avatarWrap.innerHTML = `<div class="avatar-placeholder">🎵</div>`;
      }

      // Profile
      const verifiedBadge = data.verified ? `<span class="verified-badge">✓ Verified</span>` : "";
      document.getElementById("nickname").innerHTML = data.nickname + verifiedBadge;
      document.getElementById("handle").textContent = "@" + data.username;

      // Date
      document.getElementById("creationDate").textContent = data.creationDate;
      document.getElementById("accountAge").textContent = `Account is ${data.accountAge} old (${data.accountAgeDays} days)`;

      // Stats
      document.getElementById("followers").textContent = formatNumber(data.followers);
      document.getElementById("likes").textContent = formatNumber(data.likes);
      document.getElementById("videos").textContent = formatNumber(data.videos);

      hide("loading");
      show("result");

    } catch (err) {
      showError(err.message || "Something went wrong. Try again.");
    } finally {
      document.getElementById("checkBtn").disabled = false;
    }
  }

  // Enter key support
  document.getElementById("usernameInput").addEventListener("keydown", e => {
    if (e.key === "Enter") checkUser();
  });

  function show(id) { document.getElementById(id).style.display = "block"; }
  function hide(id) { document.getElementById(id).style.display = "none"; }
  function showError(msg) {
    hide("loading");
    const el = document.getElementById("error");
    el.textContent = "⚠ " + msg;
    el.style.display = "block";
  }
</script>
</body>
</html>
